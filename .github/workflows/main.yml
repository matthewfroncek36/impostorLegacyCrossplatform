name: Build

on: push

jobs:
  build_windows:
    name: Windows
    runs-on: windows-latest
    permissions: write-all
    steps:
      - name: Checkout Repository
        id: repo-check
        uses: actions/checkout@v6

      - name: Install Haxe
        id: haxe-install
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Restore Cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          key: cache_windows
          path: |
            .haxelib/
            export/release/windows/haxe/
            export/release/windows/obj/

      - name: Install / Update Libraries
        id: lib-install
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          haxelib install hxpkg
          haxelib run hxpkg install

      - name: Set up HXCPP
        id: setup-hxcpp
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          cd ./.haxelib/hxcpp/git/tools/hxcpp/
          haxe compile.hxml
          cd ../../../../../

      - name: Rebuild Lime Tools
        id: fix-lime
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          cd ./.haxelib/lime/git/
          git submodule init
          git submodule sync
          git submodule update
          cd ../../../
          haxelib run lime rebuild cpp

      - name: Build Game
        id: game-compile
        run: |
          haxelib run lime build windows -release

      - name: Upload Artifact
        id: artifact-upload
        uses: actions/upload-artifact@v6
        with:
          name: VS IMPOSTOR Pixel (Windows)
          path: export/release/windows/bin/

      - name: Clear old Cache
        id: cache-clear
        uses: actions/github-script@v8
        if: steps.cache-restore.outputs.cache-hit == 'true'
        with:
          script: |
            const caches = github.rest.actions.deleteActionsCacheByKey({
              owner: context.repo.owner,
              repo: context.repo.repo,
              key: "cache_windows"
            });

      - name: Save new Cache
        id: cache-save
        uses: actions/cache/save@v5
        with:
          key: cache_windows
          path: |
            .haxelib/
            export/release/windows/haxe/
            export/release/windows/obj/

